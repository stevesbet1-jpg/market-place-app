<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace — Password Reset</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #071120;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #1a2332;
      border: 2px solid #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 32px;
      font-weight: bold;
      color: #d4af37;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 16px; color: #a0a8b0; line-height: 1.5; margin-bottom: 32px; max-width: 320px; }
    .btn {
      background: linear-gradient(135deg, #d4af37, #b8960c);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(212, 175, 55, 0.2);
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ff6b6b; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div id="content">
    <div class="spinner"></div>
    <p>Opening Marketplace app...</p>
  </div>

  <script>
    (function() {
      // Parse query parameters from the current URL
      const params = new URLSearchParams(window.location.search);
      const oobCode = params.get('oobCode');
      const mode = params.get('mode') || 'resetPassword';
      const apiKey = params.get('apiKey');
      const continueUrl = params.get('continueUrl');

      console.log('[FirebaseRedirect] oobCode:', oobCode ? 'present' : 'missing');
      console.log('[FirebaseRedirect] mode:', mode);
      console.log('[FirebaseRedirect] continueUrl:', continueUrl);

      const content = document.getElementById('content');

      if (!oobCode) {
        content.innerHTML = '<h1>Invalid Link</h1><p class="error">This password reset link is invalid or has expired.</p>';
        return;
      }

      // Build the deep link URL to open the app
      const deepLink = 'marketplace://reset-password?oobCode=' + encodeURIComponent(oobCode) + '&mode=' + encodeURIComponent(mode);
      console.log('[FirebaseRedirect] Deep link:', deepLink);

      // Attempt to redirect to the app
      function redirectToApp() {
        // For iOS: try to open the app via custom URL scheme
        window.location.href = deepLink;

        // Fallback: after 2.5s, show manual instructions in case the app didn't open
        setTimeout(function() {
          content.innerHTML =
            '<div class="logo">M</div>' +
            '<h1>Open Marketplace</h1>' +
            '<p>If the app did not open automatically, please return to the Marketplace app and enter your reset code manually.</p>' +
            '<a class="btn" href="' + deepLink + '">Open App</a>';
        }, 2500);
      }

      // Show branded UI briefly, then redirect
      content.innerHTML =
        '<div class="logo">M</div>' +
        '<h1>Reset Password</h1>' +
        '<p>Opening the Marketplace app to complete your password reset...</p>';

      setTimeout(redirectToApp, 800);
    })();
  </script>
</body>
</html>
