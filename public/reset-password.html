<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- No-cache directives for all browsers -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Marketplace — Password Reset</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      touch-action: pan-y;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-x: none;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #071120;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding: 20px;
      overflow-x: hidden;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #1a2332;
      border: 2px solid #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 32px;
      font-weight: bold;
      color: #d4af37;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 16px; color: #a0a8b0; line-height: 1.5; margin-bottom: 32px; max-width: 100%; }
    .btn {
      background: linear-gradient(135deg, #d4af37, #b8960c);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;
      width: 100%;
      max-width: 100%;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(212, 175, 55, 0.2);
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ff6b6b; font-size: 14px; margin-top: 16px; }
    .success { color: #4ade80; font-size: 14px; margin-top: 16px; }
    .info { color: #60a5fa; font-size: 14px; margin-top: 8px; }
    .form-group { margin-bottom: 16px; width: 100%; text-align: left; }
    .form-group label { display: block; font-size: 13px; color: #a0a8b0; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #2a3544;
      background: #111b27;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .form-group input:focus { border-color: #d4af37; }
    .password-rules { font-size: 12px; color: #6b7280; margin-top: 8px; text-align: left; max-width: 100%; }
    .password-rules li { margin-bottom: 4px; }
    input,
    textarea,
    select,
    button {
      font-size: 16px !important;
      transform: none !important;
      zoom: 1 !important;
    }
    .log-box {
      margin-top: 24px;
      padding: 12px;
      background: #0d1520;
      border: 1px solid #1e2d3d;
      border-radius: 8px;
      font-family: monospace;
      font-size: 11px;
      color: #6b7280;
      max-width: 100%;
      width: 100%;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      box-sizing: border-box;
    }
    .password-wrapper {
      position: relative;
      width: 100%;
    }
    .password-wrapper input {
      width: 100%;
      padding-right: 56px !important;
      border-radius: 10px;
      border: 1px solid #2a3544;
      background: #111b27;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .password-wrapper input:focus { border-color: #d4af37; }
    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      flex-shrink: 0;
      background: transparent;
      border: none;
      color: #a0a8b0;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .suggest-btn {
      background: transparent;
      border: 1px solid #d4af37;
      color: #d4af37;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      width: 100%;
      max-width: 100%;
      transition: background 0.2s;
    }
    .suggest-btn:hover { background: rgba(212,175,55,0.1); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="content">
      <div class="spinner"></div>
      <p>Verifying your reset link...</p>
    </div>
    <pre id="logs" class="log-box hidden"></pre>
  </div>

  <script>
    window.MARKETPLACE_API_BASE = 'https://market-place-app-1.onrender.com';
  </script>

  <script>
    (function() {
      'use strict';

      const content = document.getElementById('content');
      const logsEl = document.getElementById('logs');
      const logLines = [];

      function log(msg) {
        const line = '[' + new Date().toISOString().split('T')[1].split('.')[0] + '] ' + msg;
        logLines.push(line);
        console.log(line);
        // Debug logs kept in memory but hidden from normal users;
        // type showDebug() in browser console to reveal them.
        logsEl.textContent = logLines.join('\n');
      }
      window.showDebug = function() {
        logsEl.classList.remove('hidden');
        console.log('Debug log box revealed. ' + logLines.length + ' lines available.');
      };

      // ─── 1. Clear any cached oobCode ──────────────────────────────
      try {
        localStorage.removeItem('marketplace_reset_oobCode');
        localStorage.removeItem('marketplace_reset_mode');
        sessionStorage.removeItem('marketplace_reset_oobCode');
        sessionStorage.removeItem('marketplace_reset_mode');
        log('Cleared cached oobCode from localStorage/sessionStorage');
      } catch (e) {
        log('Storage clear warning: ' + e.message);
      }

      // ─── 2. Log full URL ────────────────────────────────────────
      log('Full URL: ' + window.location.href);
      log('Search: ' + window.location.search);
      log('Hash: ' + window.location.hash);

      // ─── 3. Robust oobCode extraction ───────────────────────────
      function extractOobCode() {
        const search = window.location.search;
        const hash = window.location.hash;

        // Try search params first
        const searchParams = new URLSearchParams(search);
        let oobCode = searchParams.get('oobCode') || searchParams.get('code') || searchParams.get('oobCode');
        let mode = searchParams.get('mode') || 'resetPassword';
        let apiKey = searchParams.get('apiKey');

        if (oobCode) {
          log('oobCode found in search params: ' + oobCode.substring(0, 8) + '...');
          return { oobCode, mode, apiKey, source: 'search' };
        }

        // Firebase sometimes wraps the action in a 'link' parameter
        const linkParam = searchParams.get('link');
        if (linkParam) {
          log('Found nested "link" param. Decoding...');
          try {
            const decodedLink = decodeURIComponent(linkParam);
            log('Decoded link: ' + decodedLink.substring(0, 120) + '...');
            const linkedUrl = new URL(decodedLink);
            const linkedParams = new URLSearchParams(linkedUrl.search);
            oobCode = linkedParams.get('oobCode') || linkedParams.get('code');
            mode = linkedParams.get('mode') || mode;
            apiKey = linkedParams.get('apiKey') || apiKey;
            if (oobCode) {
              log('oobCode extracted from nested link: ' + oobCode.substring(0, 8) + '...');
              return { oobCode, mode, apiKey, source: 'nested-link' };
            }
          } catch (e) {
            log('Failed to parse nested link: ' + e.message);
          }
        }

        // Try hash params (some email clients strip search params but keep hash)
        if (hash && hash.length > 1) {
          const hashParams = new URLSearchParams(hash.substring(1));
          oobCode = hashParams.get('oobCode') || hashParams.get('code');
          mode = hashParams.get('mode') || mode;
          apiKey = hashParams.get('apiKey') || apiKey;
          if (oobCode) {
            log('oobCode found in hash params: ' + oobCode.substring(0, 8) + '...');
            return { oobCode, mode, apiKey, source: 'hash' };
          }
        }

        // Try parsing the entire path as a query string (some proxies rewrite URLs)
        const pathQuery = window.location.pathname.split('?')[1];
        if (pathQuery) {
          const pathParams = new URLSearchParams('?' + pathQuery);
          oobCode = pathParams.get('oobCode') || pathParams.get('code');
          mode = pathParams.get('mode') || mode;
          apiKey = pathParams.get('apiKey') || apiKey;
          if (oobCode) {
            log('oobCode found in path query: ' + oobCode.substring(0, 8) + '...');
            return { oobCode, mode, apiKey, source: 'path' };
          }
        }

        log('ERROR: No oobCode found in any URL segment');
        return { oobCode: null, mode, apiKey, source: 'none' };
      }

      const { oobCode, mode, apiKey, source } = extractOobCode();
      log('mode: ' + mode);
      log('apiKey present: ' + (apiKey ? 'yes' : 'no'));
      log('source: ' + source);

      // ─── 4. Missing oobCode → show exact reason ─────────────────
      if (!oobCode) {
        content.innerHTML =
          '<div class="logo">M</div>' +
          '<h1>Invalid Link</h1>' +
          '<p class="error">The reset link is missing its verification code (oobCode).</p>' +
          '<p class="info">Reason: The URL does not contain a valid password-reset code. ' +
          'This can happen if:<br><br>' +
          '1. The link was already used (Firebase invalidates codes after first use).<br>' +
          '2. The link expired (codes expire after 1 hour).<br>' +
          '3. The email client stripped URL parameters.<br>' +
          '4. The link was copied incompletely.<br><br>' +
          'Please request a new reset email.</p>' +
          '<button class="btn" onclick="window.location.reload(true)">Retry</button>';
        return;
      }

      // ─── 5. Store current oobCode in memory only (never storage) ──
      let currentOobCode = oobCode;
      let currentApiKey = apiKey;
      let verifiedEmail = null;

      // ─── 6. Verify oobCode via Firebase REST API ──────────────────
      async function verifyCode() {
        if (!currentApiKey) {
          log('WARNING: No apiKey in URL. Cannot verify code via REST API.');
          // Still show the form; the user can try entering a password.
          // The confirm step will fail with a clear error if the code is bad.
          showPasswordForm('We could not verify this link automatically (missing API key). You can still try to reset your password below.');
          return;
        }

        log('Verifying oobCode with Firebase REST API...');
        try {
          const response = await fetch(
            'https://identitytoolkit.googleapis.com/v1/accounts:resetPassword?key=' + encodeURIComponent(currentApiKey),
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ oobCode: currentOobCode })
            }
          );
          const data = await response.json();

          if (data.email) {
            verifiedEmail = data.email;
            log('✅ Code verified. Associated email: ' + data.email);
            showPasswordForm('Code verified for ' + data.email + '. Enter your new password below.');
            return;
          }

          if (data.error && data.error.message) {
            const msg = data.error.message;
            log('❌ Firebase verification error: ' + msg);
            showError(explainFirebaseError(msg));
            return;
          }

          log('❌ Unexpected verification response: ' + JSON.stringify(data));
          showError('Unexpected response from Firebase. Please request a new reset email.');
        } catch (err) {
          log('❌ Network error during verification: ' + err.message);
          showError('Could not connect to Firebase to verify this link. Check your internet connection and try again.');
        }
      }

      function explainFirebaseError(fbMessage) {
        const reasons = {
          'INVALID_OOB_CODE': 'This reset link has already been used or is invalid. Each link can only be used once. Please request a new reset email.',
          'EXPIRED_OOB_CODE': 'This reset link has expired (links are valid for 1 hour). Please request a new reset email.',
          'USER_NOT_FOUND': 'The account associated with this link no longer exists.',
          'INVALID_API_KEY': 'The API key in this link does not match the Firebase project. Wrong project or corrupted link.',
          'OPERATION_NOT_ALLOWED': 'Password reset is not enabled for this Firebase project.',
        };
        for (const key in reasons) {
          if (fbMessage.includes(key)) {
            return reasons[key];
          }
        }
        return 'Firebase error: ' + fbMessage + '. Please request a new reset email.';
      }

      function showError(message) {
        content.innerHTML =
          '<div class="logo">M</div>' +
          '<h1>Invalid Link</h1>' +
          '<p class="error">' + escapeHtml(message) + '</p>' +
          '<button class="btn" onclick="window.location.reload(true)">Retry</button>';
      }

      function showPasswordForm(statusMessage) {
        content.innerHTML =
          '<div class="logo">M</div>' +
          '<h1>Reset Password</h1>' +
          '' +
          '<p class="success">' + escapeHtml(statusMessage) + '</p>' +
          '<div class="form-group">' +
            '<label>New Password</label>' +
            '<div class="password-wrapper">' +
              '<input type="password" id="newPassword" placeholder="Enter new password" autocomplete="new-password">' +
              '<button type="button" class="password-toggle" onclick="togglePasswordVisibility(\'newPassword\', this)" aria-label="Show password">&#128065;</button>' +
            '</div>' +
          '</div>' +
          '<div class="form-group">' +
            '<label>Confirm Password</label>' +
            '<div class="password-wrapper">' +
              '<input type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password">' +
              '<button type="button" class="password-toggle" onclick="togglePasswordVisibility(\'confirmPassword\', this)" aria-label="Show password">&#128065;</button>' +
            '</div>' +
          '</div>' +
          '<button type="button" class="suggest-btn" onclick="suggestPassword()">Suggest strong password</button>' +
          '<p class="info hidden" id="passwordPreview"></p>' +
          '<ul class="password-rules">' +
            '<li>At least 8 characters</li>' +
            '<li>1 uppercase letter</li>' +
            '<li>1 lowercase letter</li>' +
            '<li>1 number</li>' +
            '<li>1 symbol</li>' +
          '</ul>' +
          '<button class="btn" id="submitBtn" onclick="handleConfirm()">Reset Password</button>' +
          '<p class="error hidden" id="formError"></p>';
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      window.togglePasswordVisibility = function(inputId, btnEl) {
        const newPwInput = document.getElementById('newPassword');
        const confirmPwInput = document.getElementById('confirmPassword');
        if (!newPwInput || !confirmPwInput) return;
        const isHidden = newPwInput.type === 'password';
        const newType = isHidden ? 'text' : 'password';
        newPwInput.type = newType;
        confirmPwInput.type = newType;
        // Update both toggle buttons
        const toggles = document.querySelectorAll('.password-toggle');
        toggles.forEach(function(t) {
          t.innerHTML = isHidden ? '&#128064;' : '&#128065;'; // eye-slash vs eye
          t.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        });
      };

      window.suggestPassword = function() {
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const lower = 'abcdefghijklmnopqrstuvwxyz';
        const digits = '0123456789';
        const symbols = '!@#$%^&*';
        const all = upper + lower + digits + symbols;

        function randChar(str) { return str[Math.floor(Math.random() * str.length)]; }
        function shuffle(arr) {
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
          return arr;
        }

        // Ensure at least one of each required character type
        const chars = [
          randChar(upper),
          randChar(lower),
          randChar(digits),
          randChar(symbols),
        ];
        // Random length between 12 and 18 so dot count visibly changes
        const length = 12 + Math.floor(Math.random() * 7);
        for (let i = 4; i < length; i++) {
          chars.push(randChar(all));
        }
        const pw = shuffle(chars).join('');

        const newPwInput = document.getElementById('newPassword');
        const confirmPwInput = document.getElementById('confirmPassword');
        if (!newPwInput || !confirmPwInput) return;

        function replaceInput(oldInput) {
          const clone = oldInput.cloneNode(true);
          clone.setAttribute('autocomplete', 'new-password');
          clone.setAttribute('autocorrect', 'off');
          clone.setAttribute('autocapitalize', 'off');
          clone.setAttribute('spellcheck', 'false');
          clone.removeAttribute('value');
          oldInput.parentNode.replaceChild(clone, oldInput);
          return clone;
        }

        const freshNew = replaceInput(newPwInput);
        const freshConfirm = replaceInput(confirmPwInput);

        freshNew.value = pw;
        freshConfirm.value = pw;

        const preview = document.getElementById('passwordPreview');
        if (preview) {
          preview.textContent = 'Generated password applied (' + pw.length + ' characters)';
          preview.classList.remove('hidden');
        }
        log('Suggested password generated (' + pw.length + ' chars)');
      };

      // ─── 7. Handle password confirm ───────────────────────────────
      window.handleConfirm = async function() {
        const newPw = document.getElementById('newPassword').value;
        const confirmPw = document.getElementById('confirmPassword').value;
        const submitBtn = document.getElementById('submitBtn');
        const formError = document.getElementById('formError');

        formError.classList.add('hidden');

        if (!newPw || newPw.length < 8) {
          formError.textContent = 'Password must be at least 8 characters.';
          formError.classList.remove('hidden');
          return;
        }
        if (newPw !== confirmPw) {
          formError.textContent = 'Passwords do not match.';
          formError.classList.remove('hidden');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Resetting...';
        log('Submitting new password to Firebase...');

        try {
          const response = await fetch(
            'https://identitytoolkit.googleapis.com/v1/accounts:resetPassword?key=' + encodeURIComponent(currentApiKey),
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ oobCode: currentOobCode, newPassword: newPw })
            }
          );
          const data = await response.json();

          if (data.email) {
            log('✅ Password reset successful for: ' + data.email);
            console.log('[ResetSuccess] Password reset succeeded for email:', data.email);
            // ─── 8. Clear oobCode from memory immediately ─────────
            currentOobCode = null;
            currentApiKey = null;
            // ─── 9. Send confirmation email (blocking, must succeed) ─
            const confirmTarget = data.email || verifiedEmail;
            console.log('[PASSWORD CHANGED EMAIL START]', confirmTarget);
            if (!confirmTarget) {
              console.error('[PASSWORD CHANGED EMAIL ERROR]', 'Missing email for confirmation');
              formError.textContent = 'Password was reset but we could not send a confirmation email (missing email).';
              formError.classList.remove('hidden');
              submitBtn.disabled = false;
              submitBtn.textContent = 'Reset Password';
              return;
            }
            const confirmResult = await sendConfirmationEmail(confirmTarget);
            console.log('[PASSWORD CHANGED EMAIL RESULT]', confirmResult);
            if (confirmResult && confirmResult.success === true) {
              console.log('[PASSWORD CHANGED EMAIL]', true, confirmResult.emailId, confirmTarget);
              showSuccessPage();
            } else {
              console.error('[PASSWORD CHANGED EMAIL]', false, null, confirmTarget);
              console.error('[PASSWORD CHANGED EMAIL ERROR]', confirmResult.error || 'Confirmation email failed');
              formError.textContent = confirmResult.error || 'Password was reset but confirmation email failed.';
              formError.classList.remove('hidden');
              submitBtn.disabled = false;
              submitBtn.textContent = 'Reset Password';
            }
            return;
          }

          if (data.error && data.error.message) {
            log('❌ Confirm failed: ' + data.error.message);
            formError.textContent = explainFirebaseError(data.error.message);
            formError.classList.remove('hidden');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Reset Password';
            return;
          }

          log('❌ Unexpected confirm response: ' + JSON.stringify(data));
          formError.textContent = 'An unexpected error occurred. Please try again.';
          formError.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
        } catch (err) {
          log('❌ Network error during confirm: ' + err.message);
          formError.textContent = 'Network error. Please check your connection and try again.';
          formError.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
        }
      };

      function showSuccessPage() {
        content.innerHTML =
          '<div class="logo">M</div>' +
          '<h1>Password Updated</h1>' +
          '' +
          '<p class="success">Your password has been reset successfully.</p>' +
          '' +
          '<button class="btn" id="backToLoginBtn" onclick="backToLogin()">Back to Login</button>';
      }

      window.backToLogin = function() {
        const btn = document.getElementById('backToLoginBtn');
        if (btn) { btn.disabled = true; btn.textContent = 'Opening...'; }
        log('Back to Login clicked. Attempting deep links...');

        // Try production scheme first
        window.location.href = 'marketplace://login';
        log('Tried marketplace://login');

        // After 2s, if still here, try Expo Go
        setTimeout(function() {
          if (document.hasFocus && document.visibilityState !== 'hidden') {
            log('Production scheme did not open. Trying Expo Go...');
            window.location.href = 'exp://10.0.0.14:8081/--/login';
            log('Tried exp://10.0.0.14:8081/--/login');
          }
        }, 2000);

        // After 4s total, show clean fallback if still here
        setTimeout(function() {
          if (document.hasFocus && document.visibilityState !== 'hidden') {
            log('Deep links did not open app. Showing clean fallback.');
            content.innerHTML =
              '<div class="logo">M</div>' +
              '<h1>Almost Done</h1>' +
              '' +
              '<p class="success">Your password has been reset.</p>' +
              '' +
              '<p>Please open the <strong>Marketplace</strong> app manually and sign in.</p>' +
              '' +
              '<button class="btn" onclick="window.location.reload(true)">Retry</button>';
          }
        }, 4000);
      };

      // Internal fallback functions preserved (not shown in normal UI)
      window.tryOpenExpo = function() {
        log('Attempting to open Expo Go app (internal fallback)...');
        window.location.href = 'exp://10.0.0.14:8081';
        setTimeout(function() {
          if (document.hasFocus && document.visibilityState !== 'hidden') {
            window.location.href = 'exp://10.0.0.14:8081/--/login';
          }
        }, 2500);
        setTimeout(function() {
          if (document.hasFocus && document.visibilityState !== 'hidden') {
            window.location.href = 'marketplace://login';
          }
        }, 5000);
      };

      window.copyLoginHint = function() {
        const text = 'Password reset complete. Open Expo Go and go to Login to sign in with your new password.';
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function() {
            const fb = document.getElementById('copyHintFeedback');
            if (fb) { fb.classList.remove('hidden'); }
            log('Login hint copied to clipboard');
          }).catch(function(err) {
            log('Clipboard API failed: ' + err.message);
            fallbackCopyText(text);
          });
        } else {
          fallbackCopyText(text);
        }
      };

      function fallbackCopyText(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          const fb = document.getElementById('copyHintFeedback');
          if (fb) { fb.classList.remove('hidden'); }
          log('Login hint copied (fallback)');
        } catch (e) {
          log('Copy failed: ' + e.message);
        }
        document.body.removeChild(ta);
      }

      // ─── Backend API base ──────────────────────────────────────────
      // Always use live Render backend (never localhost, never same-origin)
      const API_BASE = 'https://market-place-app-1.onrender.com';
      console.log('[API] Using Render backend:', API_BASE);

      async function sendConfirmationEmail(email) {
        if (!API_BASE) {
          console.warn('[ConfirmEmail] Skipped: no API_BASE available for host:', window.location.hostname);
          log('⚠️ Confirmation email skipped (backend not configured for this host)');
          return { success: false, error: 'No API_BASE configured' };
        }
        log('Sending confirmation email to: ' + email);
        console.log('[PASSWORD CHANGED EMAIL START]', email);
        console.log('[ConfirmEmail] API base:', API_BASE);
        var payload = JSON.stringify({ email: email });
        try {
          var endpoint = API_BASE + '/api/send-confirmation';
          console.log('[ConfirmEmail] POST', endpoint);
          var response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: payload,
          });
          console.log('[ConfirmEmail] Response status:', response.status, response.statusText);
          var result = await response.json();
          console.log('[PASSWORD CHANGED EMAIL RESULT]', result);
          if (result.success) {
            log('✅ Confirmation email sent. ID: ' + (result.emailId || 'N/A'));
            console.log('[PASSWORD CHANGED EMAIL]', true, result.emailId, email);
            return { success: true, emailId: result.emailId };
          } else {
            log('⚠️ Confirmation email failed: ' + (result.error || 'Unknown error'));
            console.error('[PASSWORD CHANGED EMAIL ERROR]', result.error || 'Unknown error');
            return { success: false, error: result.error || 'Unknown error' };
          }
        } catch (err) {
          log('⚠️ Could not reach confirmation API (' + API_BASE + '): ' + err.message);
          console.error('[PASSWORD CHANGED EMAIL ERROR]', err.message);
          return { success: false, error: err.message || 'Network error' };
        }
      }

      // ─── Start verification ───────────────────────────────────────
      verifyCode();
    })();
  </script>
</body>
